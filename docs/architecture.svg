<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="1300" fill="#ffffff"/>

  <!-- Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e293b"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-ws" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">CI/CD Build Pipeline - System Architecture</text>
  <line x1="350" y1="60" x2="850" y2="60" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- LAYOUT: Left column (Browser)                -->
  <!--           Center column (API, queue, worker, runner) -->
  <!--           Right column (Docker Hub, return flows) -->
  <!-- ============================================ -->

  <!-- ========== TIER 1: Browser <-> API Server ========== -->
  <!-- Browser (left) -->
  <g filter="url(#shadow)">
    <rect x="100" y="120" width="200" height="90" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="200" y="155" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e3a8a">Browser</text>
    <text x="200" y="180" text-anchor="middle" font-size="13" fill="#1e3a8a">React Client</text>
  </g>

  <!-- API Server (right) -->
  <g filter="url(#shadow)">
    <rect x="800" y="120" width="240" height="90" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="920" y="155" text-anchor="middle" font-size="17" font-weight="bold" fill="#14532d">API Server</text>
    <text x="920" y="180" text-anchor="middle" font-size="13" fill="#14532d">Express + Socket.IO</text>
  </g>

  <!-- Arrow: Browser -> API Server (top, POST /api/jobs) -->
  <line x1="300" y1="150" x2="800" y2="150" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="475" y="132" width="150" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="550" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">POST /api/jobs</text>

  <!-- Arrow: API Server -> Browser (bottom, 201) -->
  <line x1="800" y1="180" x2="300" y2="180" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="475" y="162" width="150" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="550" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">201 { job }</text>

  <!-- ========== TIER 2: API Server -> Redis (enqueue) ========== -->
  <!-- Redis (center) -->
  <g filter="url(#shadow)">
    <rect x="475" y="290" width="250" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="600" y="325" text-anchor="middle" font-size="17" font-weight="bold" fill="#7c2d12">Redis</text>
    <text x="600" y="350" text-anchor="middle" font-size="13" fill="#7c2d12">BullMQ - build-queue</text>
    <text x="600" y="372" text-anchor="middle" font-size="11" font-style="italic" fill="#9a3412">persistent job queue</text>
  </g>

  <!-- Arrow: API Server -> Redis (diagonal down-left, dashed = enqueue) -->
  <line x1="850" y1="210" x2="700" y2="288" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="755" y="232" width="80" height="22" rx="4" fill="#fff7ed" stroke="none"/>
  <text x="795" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#ea580c">enqueue</text>

  <!-- ========== TIER 3: Redis -> Worker (dequeue) ========== -->
  <!-- Worker (center) -->
  <g filter="url(#shadow)">
    <rect x="475" y="450" width="250" height="100" rx="8" fill="#faf5ff" stroke="#7e22ce" stroke-width="2"/>
    <text x="600" y="485" text-anchor="middle" font-size="17" font-weight="bold" fill="#581c87">Worker</text>
    <text x="600" y="510" text-anchor="middle" font-size="13" fill="#581c87">Background Processor</text>
    <text x="600" y="532" text-anchor="middle" font-size="11" font-style="italic" fill="#6b21a8">(no exposed port)</text>
  </g>

  <!-- Arrow: Redis -> Worker (down, dashed = dequeue) -->
  <line x1="600" y1="390" x2="600" y2="448" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="555" y="410" width="90" height="22" rx="4" fill="#fff7ed" stroke="none"/>
  <text x="600" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#ea580c">dequeue</text>

  <!-- ========== TIER 4: Worker -> Runner (POST /execute) ========== -->
  <!-- Runner (center) -->
  <g filter="url(#shadow)">
    <rect x="450" y="610" width="300" height="120" rx="8" fill="#faf5ff" stroke="#6b21a8" stroke-width="2"/>
    <text x="600" y="645" text-anchor="middle" font-size="17" font-weight="bold" fill="#581c87">Runner</text>
    <text x="600" y="670" text-anchor="middle" font-size="13" fill="#581c87">Privileged Docker Executor</text>
    <text x="600" y="697" text-anchor="middle" font-size="11" font-style="italic" fill="#6b21a8">git clone  -&gt;  docker build  -&gt;  docker push</text>
  </g>

  <!-- Arrow: Worker -> Runner (down) -->
  <line x1="600" y1="550" x2="600" y2="608" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="545" y="565" width="110" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="600" y="581" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">POST /execute</text>

  <!-- ========== TIER 5: Runner -> Docker Hub (docker push) ========== -->
  <!-- Docker Hub (left side of Runner) -->
  <g filter="url(#shadow)">
    <rect x="100" y="630" width="220" height="90" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="210" y="665" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Docker Hub</text>
    <text x="210" y="690" text-anchor="middle" font-size="13" fill="#334155">Container Registry</text>
  </g>

  <!-- Arrow: Runner -> Docker Hub (left) -->
  <line x1="450" y1="670" x2="320" y2="670" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="335" y="652" width="100" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="385" y="668" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">docker push</text>

  <!-- ========== TIER 6: Runner -> API Server (logs + status) ========== -->
  <!-- Arrow: Runner -> API Server (curved far right, logs) -->
  <path d="M 750 670 Q 1130 670 1130 350 Q 1130 240 1040 210" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1080" y="395" width="100" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="1130" y="411" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">POST /api/logs</text>

  <!-- Arrow: Runner -> API Server (curved far right, status) -->
  <path d="M 750 700 Q 1170 700 1170 380 Q 1170 260 1060 210" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1100" y="475" width="100" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="1150" y="491" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">POST /api/status</text>

  <!-- ========== TIER 7: API Server -> Browser (WebSocket) ========== -->
  <!-- Arrow: API Server -> Browser (curved up over the top) -->
  <path d="M 800 145 Q 600 75 400 145" fill="none" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-ws)"/>
  <rect x="500" y="80" width="200" height="22" rx="4" fill="#ffffff" stroke="none"/>
  <text x="600" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#0284c7">ws: log / status (Socket.IO)</text>

  <!-- ========== LEGEND ========== -->
  <g transform="translate(900, 800)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Legend</text>
    <line x1="30" y1="40" x2="190" y2="40" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Solid -->
    <line x1="20" y1="65" x2="55" y2="65" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="70" y="69" font-size="12" fill="#0f172a">Solid - HTTP (sync)</text>

    <!-- Dashed -->
    <line x1="20" y1="100" x2="55" y2="100" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
    <text x="70" y="104" font-size="12" fill="#0f172a">Dashed - Queue (async)</text>

    <!-- WebSocket -->
    <line x1="20" y1="135" x2="55" y2="135" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-ws)"/>
    <text x="70" y="139" font-size="12" fill="#0f172a">Blue - WebSocket</text>

    <!-- Color legend -->
    <rect x="20" y="160" width="14" height="14" fill="#dbeafe" stroke="#1d4ed8"/>
    <text x="42" y="171" font-size="11" fill="#0f172a">Component color codes</text>
  </g>

  <!-- ========== FOOTER ========== -->
  <line x1="100" y1="1230" x2="1100" y2="1230" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="1260" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">
    Asynchronous build pipeline: client submits job -&gt; queue -&gt; worker -&gt; runner -&gt; image registry, with real-time log and status streamed back via WebSocket.
  </text>
  <text x="600" y="1280" text-anchor="middle" font-size="10" fill="#94a3b8">
    Components: 6  |  Flows: 9  |  Patterns: HTTP REST, Message Queue, WebSocket Streaming
  </text>
</svg>
